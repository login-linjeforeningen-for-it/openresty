services:
  openresty:
    container_name: openresty
    build: .
    restart: always
    network_mode: host
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./${NGINX_MAIN_CONF:-nginx/conf/nginx.conf}:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./${NGINX_CONF_FILE:-nginx/conf.d/default.conf}:/usr/local/openresty/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/usr/local/openresty/nginx/conf/snippets
      - ./nginx/errors:/usr/local/openresty/nginx/errors
      - ./nginx/maxmind:/usr/local/openresty/nginx/maxmind
      - ./nginx/lua:/usr/local/openresty/nginx/lua

    mem_limit: 1g
    cpus: "2.0"
