server {
    listen 443;
    listen [::]:443;

    server_name authentik.login.no;
    include snippets/errors.conf;

    log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;

    location = /.well-known/openid-configuration/application/o/s3 {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84/application/o/s3/.well-known/openid-configuration;
    }

    location = /.well-known/openid-configuration/application/o/s3/ {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84/application/o/s3/.well-known/openid-configuration;
    }

    location / {
        proxy_ssl_server_name on;
        proxy_ssl_name authentik.login.no;
        proxy_set_header Host authentik.login.no;
        proxy_set_header X-Forwarded-Host authentik.login.no;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://57.129.124.84;
    }
}

server {
    listen 443;
    listen [::]:443;

    server_name s3.login.no;
    include snippets/errors.conf;

    client_max_body_size 0;

    log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;

    location / {
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://localhost:9100;
        include snippets/proxy-headers-proxy.conf;
    }
}

server {
    listen 443;
    listen [::]:443;

    server_name spaces.login.no;
    include snippets/errors.conf;

    client_max_body_size 0;

    log_by_lua_file /usr/local/openresty/nginx/lua/traffic_logger.lua;

    location = / {
        if ($vpn = 0) {
            return 407;
        }

        return 302 https://spaces.login.no/rustfs/admin/v3/oidc/authorize/default?redirect_after=/rustfs/console/;
    }

    location ~ ^/rustfs/console/auth/(login|key-login|sts-login)/?$ {
        if ($vpn = 0) {
            return 407;
        }

        return 302 https://spaces.login.no/rustfs/admin/v3/oidc/authorize/default?redirect_after=/rustfs/console/;
    }

    location / {
        if ($vpn = 0) {
            return 407;
        }

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://localhost:9101;
        include snippets/proxy-headers-proxy.conf;
    }
}

