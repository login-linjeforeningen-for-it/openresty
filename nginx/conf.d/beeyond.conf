map $remote_addr $client_ip {
    default $remote_addr;
}

geo $client_ip $vpn {
    default 0;

    # IPv4 private ranges
    10.0.0.0/8       1;
    192.168.0.0/16   1;
    172.16.0.0/12    1;

    # NTNU and related allowlist ranges
    129.240.0.0/16   1;
    129.241.0.0/16   1;
    129.242.0.0/16   1;
    78.91.0.0/18     1;
    78.91.64.0/20    1;
    78.91.80.0/22    1;
    128.39.0.0/16    1;
    158.38.0.0/16    1;
    10.133.0.0/16    1;

    # IPv6 ranges
    2001:700:300::/46 1;
    2001:700:b00::/48 1;
    2001:700:1200::/48 1;
    2001:700:1d00::/48 1;
    2001:700:300::/44 1;
}

server {
    listen 80;
    listen [::]:80;

    server_name login.no *.login.no;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name vault.login.no;
    
    ssl_certificate /etc/letsencrypt/live/vault.login.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.login.no/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include snippets/errors.conf;

    location / {
        proxy_pass http://127.0.0.1:8800;
        include snippets/proxy-headers.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name authentik.login.no;
    
    ssl_certificate /etc/letsencrypt/live/authentik.login.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/authentik.login.no/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include snippets/errors.conf;

    location / {
        proxy_pass https://127.0.0.1:9443;
        include snippets/proxy-headers.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name zammad.login.no;

    ssl_certificate /etc/letsencrypt/live/zammad.login.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zammad.login.no/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include snippets/errors.conf;

    location / {
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;

        proxy_pass http://127.0.0.1:8080;
        include snippets/proxy-headers.conf;
    }
}